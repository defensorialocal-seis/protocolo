<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Modelos por etapa | Defensoría</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <!-- Quill editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef3f8;
      color: #0a2f44;
      line-height: 1.45;
    }
    .app-layout {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }
    .grid-dos-paneles {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.8rem;
      padding: 2rem;
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
    }
    .panel-materias {
      background: transparent;
      overflow-y: auto;
      padding-right: 0.25rem;
    }
    .titulo-herramienta {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1e4a6b;
      margin-bottom: 1.5rem;
      border-bottom: 3px solid #ff9800;
      padding-bottom: 10px;
    }
    .materia-bloque {
      background: white;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      border: 1px solid #d9e4ec;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .materia-titulo {
      background: #ffffff;
      padding: 0.9rem 1.2rem;
      font-weight: 700;
      font-size: 1rem;
      border-left: 5px solid #ff9800;
      color: #1e4a6b;
      border-bottom: 1px solid #ecf3f8;
      cursor: pointer;
      transition: 0.15s;
    }
    .materia-titulo:hover {
      background: #f9fafc;
    }
    .materia-titulo.activa {
      background: #eef4fb;
      border-left-color: #e67e22;
    }
    .lista-procesos {
      list-style: none;
      padding: 0.4rem 0;
    }
    .proceso-enlace {
      display: block;
      padding: 0.6rem 1rem 0.6rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #2c4b64;
      border-bottom: 1px solid #edf2f7;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .proceso-enlace:hover {
      background: #f3f9ff;
      padding-left: 1.8rem;
    }
    .proceso-enlace.activo {
      background: #eef4fb;
      border-left: 3px solid #ff9800;
      font-weight: 700;
      color: #0a2f44;
    }
    .panel-escritos {
      background: #ffffff;
      border-radius: 28px;
      padding: 1.5rem 1.8rem;
      border: 1px solid #dce9f0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
    }
    .cabecera-proceso {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 2px solid #ffeedb;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
    }
    .info-proceso {
      flex: 1;
    }
    .nombre-proceso-grande {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: #1e4a6b;
    }
    .subtitulo-materia {
      font-size: 0.75rem;
      color: #6c8dae;
      margin-top: 4px;
    }
    .search-input {
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px solid #cbdbe6;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      width: 220px;
      background: white;
      transition: 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #ff9800;
      box-shadow: 0 0 0 2px rgba(255,152,0,0.2);
    }
    .etapa-container {
      margin-top: 0.5rem;
    }
    .etapa-card {
      background: #fbfeff;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      border: 1px solid #e4edf5;
      padding: 1rem 1.2rem;
      transition: all 0.1s;
    }
    .etapa-numero {
      font-weight: 800;
      font-size: 1rem;
      color: #ff9800;
      margin-bottom: 0.2rem;
      display: inline-block;
      border-bottom: 2px solid #ffd9a3;
      padding-right: 8px;
    }
    .etapa-titulo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e4a6b;
      margin: 4px 0 6px 0;
    }
    .descripcion-etapa {
      color: #3d5f7c;
      font-size: 0.8rem;
      line-height: 1.45;
      margin-bottom: 12px;
    }
    .modelo-info {
      background: #f6fafd;
      border-radius: 16px;
      padding: 0.7rem 1rem;
      margin-top: 10px;
      border: 1px solid #e2ecf5;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .modelo-titulo {
      font-weight: 600;
      color: #1e4a6b;
      background: white;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      border: 1px solid #cde3ef;
      word-break: break-word;
      max-width: 60%;
    }
    .botones-modelo {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-mostrar {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .btn-mostrar:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    .btn-crear {
      background: #ff9800;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .btn-crear:hover {
      transform: translateY(-1px);
      filter: brightness(0.95);
    }
    .mensaje-guia {
      background: #fef6e8;
      border-left: 5px solid #ff9800;
      padding: 0.8rem 1rem;
      border-radius: 20px;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #5b6e7e;
    }
    footer {
      text-align: center;
      font-size: 0.65rem;
      margin-top: 2rem;
      color: #8ba0b0;
      border-top: 1px solid #e2edf5;
      padding-top: 1rem;
    }
    /* MODALES */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 22px;
      border-radius: 28px;
      width: 90%;
      max-width: 850px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      border-bottom: 2px solid #ffeedb;
      padding-bottom: 8px;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 26px;
      cursor: pointer;
      color: #888;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1e4a6b;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbdbe6;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      background: white;
    }
    .form-group select:disabled {
      background: #f0f2f5;
      color: #5a6e7c;
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }
    .btn-save, .btn-cancel-modal {
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-save {
      background: #ff9800;
      color: white;
    }
    .btn-cancel-modal {
      background: #e2e8f0;
      color: #2c4b64;
    }
    #bodyEditorQuill {
      min-height: 220px;
      background: white;
      border-radius: 14px;
      border: 1px solid #cbdbe6;
    }
    .loading-spinner {
      text-align: center;
      padding: 2rem;
      color: #ff9800;
      font-size: 0.9rem;
    }
    /* Modal de ver documento */
    .documento-completo {
      line-height: 1.5;
      font-size: 0.9rem;
    }
    .doc-meta {
      background: #f4f9fe;
      padding: 0.8rem;
      border-radius: 16px;
      margin-bottom: 1rem;
      font-size: 0.8rem;
    }
    .doc-contenido {
      border-top: 1px solid #e2edf5;
      padding-top: 1rem;
    }
    .acciones-documento {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn-editar-doc, .btn-imprimir-doc {
      border: none;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .btn-editar-doc {
      background: #10b981;
      color: white;
    }
    .btn-editar-doc:hover { background: #059669; }
    .btn-imprimir-doc {
      background: #6c757d;
      color: white;
    }
    .btn-imprimir-doc:hover { background: #5a6268; }
    @media (max-width: 820px) {
      .grid-dos-paneles {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
      }
      .search-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="grid-dos-paneles">
    <aside class="panel-materias">
      <h1 class="titulo-herramienta">Redacción de Documentos</h1>
      <div id="contenedorMaterias"></div>
      <footer>Procesos existentes · Gestión unificada</footer>
    </aside>
    <div class="panel-escritos" id="panelEscritos">
      <div class="cabecera-proceso">
        <div class="info-proceso">
          <div class="nombre-proceso-grande" id="procesoSeleccionadoNombre">Seleccione un proceso</div>
          <div class="subtitulo-materia" id="subMateriaProceso">Los procesos se crean al guardar un modelo</div>
        </div>
        <input type="text" id="searchModelos" class="search-input" placeholder="🔍 Buscar modelo...">
      </div>
      <div id="etapasDinamicasContainer">
        <div class="mensaje-guia">◆ Seleccione un proceso del menú izquierdo.</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL para crear/editar modelo -->
<div id="modalModelo" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitleModelo">Modelo de escrito</h2>
      <button class="close-btn" id="closeModalBtnModelo">&times;</button>
    </div>
    <form id="etapaModelForm">
      <input type="hidden" id="modeloDocId">
      <input type="hidden" id="materiaHidden">
      <input type="hidden" id="procesoHidden">
      <input type="hidden" id="etapaHidden">
      <div class="form-group">
        <label for="materiaModelo">Materia *</label>
        <select id="materiaModelo" required>
          <option value="">Seleccionar materia</option>
          <option value="FAMILIA">⚖️ FAMILIA</option>
          <option value="CIVIL">⚖️ CIVIL</option>
          <option value="LABORAL">⚖️ LABORAL</option>
          <option value="VIOLENCIA FAMILIAR">⚖️ VIOLENCIA FAMILIAR</option>
        </select>
      </div>
      <div class="form-group">
        <label for="procesoLibre">Nombre del proceso *</label>
        <input type="text" id="procesoLibre" required placeholder="Ej: Divorcio contencioso">
      </div>
      <div class="form-group">
        <label for="etapaModelo">Etapa procesal *</label>
        <select id="etapaModelo" required>
          <option value="Etapa inicial">Etapa inicial</option>
          <option value="Etapa de Contestación">Etapa de Contestación</option>
          <option value="Etapa probatoria">Etapa probatoria</option>
          <option value="Etapa Recursiva">Etapa Recursiva</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tipoDocumento">Tipo de documento *</label>
        <select id="tipoDocumento" required>
          <option value="">Seleccionar</option>
          <option value="Escrito">Escrito</option>
          <option value="Oficio">Oficio</option>
          <option value="Cédula">Cédula</option>
          <option value="Mandamiento">Mandamiento</option>
          <option value="Cédula Ley">Cédula Ley</option>
          <option value="Oficio Ley">Oficio Ley</option>
          <option value="Mandamiento Ley">Mandamiento Ley</option>
          <option value="Dictamen">Dictamen</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tituloModelo">Título del modelo *</label>
        <input type="text" id="tituloModelo" required>
      </div>
      <div class="form-group">
        <label for="thematicModelo">Temática *</label>
        <select id="thematicModelo" required>
          <option value="">Seleccionar</option>
          <option value="Civil">Civil</option>
          <option value="Penal">Penal</option>
          <option value="Laboral">Laboral</option>
          <option value="Familia">Familia</option>
          <option value="Administrativo">Administrativo</option>
          <option value="Violencia Familiar">Violencia Familiar</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label for="leyModelo">Ley / Normativa</label>
        <input type="text" id="leyModelo">
      </div>
      <div class="form-group">
        <label>Cuerpo del escrito *</label>
        <div id="bodyEditorQuill"></div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel-modal" id="cancelModalBtn">Cancelar</button>
        <button type="submit" class="btn-save">Guardar modelo</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL unificado para MOSTRAR documento (ver + acciones editar/imprimir, sin eliminar) -->
<div id="modalVerDocumento" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📄 Documento completo</h2>
      <button class="close-btn" id="closeVerModal">&times;</button>
    </div>
    <div id="contenidoVerDocumento"></div>
    <div class="acciones-documento">
      <button id="btnEditarDesdeVer" class="btn-editar-doc">✏️ Editar</button>
      <button id="btnImprimirDesdeVer" class="btn-imprimir-doc">🖨️ Imprimir</button>
    </div>
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAchXP14PPlBLGFdJhQG-ABvCZEvxtExP0",
    authDomain: "modelosvarios6.firebaseapp.com",
    projectId: "modelosvarios6",
    storageBucket: "modelosvarios6.firebasestorage.app",
    messagingSenderId: "1020516092766",
    appId: "1:1020516092766:web:56954ecc35055fff901dcf"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const modelosEtapaCollection = db.collection('modelosEtapa');

  const etapasFijas = [
    { numero: 1, nombre: "Etapa inicial", descripcion: "Redacción de demanda, poder especial, medidas cautelares urgentes, anexos documentales y solicitud de gratuidad." },
    { numero: 2, nombre: "Etapa de Contestación", descripcion: "Respuesta al traslado de la demanda, excepciones, reconvención y ofrecimiento de prueba." },
    { numero: 3, nombre: "Etapa probatoria", descripcion: "Producción de prueba: testimonial, pericial, documental, informes, absolución de posiciones." },
    { numero: 4, nombre: "Etapa Recursiva", descripcion: "Interposición de recursos ordinarios o extraordinarios (apelación, queja, casación)." }
  ];

  let currentMateria = "", currentProceso = "";
  let quillEditor = null;
  let currentDocumentoData = null;

  function initQuillEditor() {
    if (!quillEditor) {
      quillEditor = new Quill('#bodyEditorQuill', {
        theme: 'snow',
        placeholder: 'Escriba el contenido del documento...',
        modules: { toolbar: true }
      });
    }
  }

  async function obtenerProcesosUnicos() {
    try {
      const snapshot = await modelosEtapaCollection.get();
      const procesosMap = new Map();
      snapshot.docs.forEach(doc => {
        const data = doc.data();
        const materia = data.materia;
        const proceso = data.proceso;
        if (materia && proceso) {
          if (!procesosMap.has(materia)) procesosMap.set(materia, new Set());
          procesosMap.get(materia).add(proceso);
        }
      });
      const resultado = {};
      const ordenMaterias = ["FAMILIA", "CIVIL", "LABORAL", "VIOLENCIA FAMILIAR"];
      for (const mat of ordenMaterias) {
        resultado[mat] = procesosMap.has(mat) ? Array.from(procesosMap.get(mat)).sort() : [];
      }
      return resultado;
    } catch (error) {
      console.error(error);
      return { "FAMILIA": [], "CIVIL": [], "LABORAL": [], "VIOLENCIA FAMILIAR": [] };
    }
  }

  async function construirSidebarDinamico() {
    const contenedor = document.getElementById('contenedorMaterias');
    if (!contenedor) return;
    const procesosPorMateria = await obtenerProcesosUnicos();
    let html = '';
    const materiasNombre = {
      "FAMILIA": "⚖️ FAMILIA",
      "CIVIL": "⚖️ CIVIL",
      "LABORAL": "⚖️ LABORAL",
      "VIOLENCIA FAMILIAR": "⚖️ VIOLENCIA FAMILIAR"
    };
    for (const [materiaKey, procesos] of Object.entries(procesosPorMateria)) {
      html += `<div class="materia-bloque" data-materia="${materiaKey}">
        <div class="materia-titulo">${materiasNombre[materiaKey] || materiaKey}</div>
        <ul class="lista-procesos">`;
      if (procesos.length === 0) {
        html += `<li class="proceso-enlace vacio" style="color:#aaa; font-style:italic;">Sin procesos aún</li>`;
      } else {
        procesos.forEach(proc => {
          html += `<li class="proceso-enlace" data-materia="${materiaKey}" data-proceso="${escapeHtmlAttr(proc)}">${escapeHtml(proc)}</li>`;
        });
      }
      html += `</ul></div>`;
    }
    contenedor.innerHTML = html;

    document.querySelectorAll('.proceso-enlace:not(.vacio)').forEach(el => {
      el.addEventListener('click', async () => {
        document.querySelectorAll('.proceso-enlace').forEach(e => e.classList.remove('activo'));
        el.classList.add('activo');
        currentMateria = el.getAttribute('data-materia');
        currentProceso = el.getAttribute('data-proceso');
        document.getElementById('procesoSeleccionadoNombre').innerText = currentProceso;
        document.getElementById('subMateriaProceso').innerHTML = `Materia: ${currentMateria} · Modelos por etapa`;
        document.getElementById('searchModelos').value = '';
        await renderizarPanelConEtapas(currentMateria, currentProceso, '');
      });
    });
    const primerProceso = document.querySelector('.proceso-enlace:not(.vacio)');
    if (primerProceso) primerProceso.click();
    else {
      document.getElementById('etapasDinamicasContainer').innerHTML = '<div class="mensaje-guia">◆ No hay procesos creados. Comience creando un nuevo modelo (+ Nuevo modelo).</div>';
    }
  }

  function escapeHtmlAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function fetchModeloEtapa(materia, proceso, etapaNombre) {
    try {
      const snapshot = await modelosEtapaCollection.where("materia", "==", materia).where("proceso", "==", proceso).where("etapa", "==", etapaNombre).limit(1).get();
      if (!snapshot.empty) return { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
      return null;
    } catch (error) { console.error(error); return null; }
  }

  async function saveModeloEtapa(modeloData, docId = null) {
    try {
      if (docId) await modelosEtapaCollection.doc(docId).update(modeloData);
      else await modelosEtapaCollection.add(modeloData);
      return true;
    } catch (error) { console.error(error); alert("Error al guardar: " + error.message); return false; }
  }

  function filtrarModelosSegunBusqueda(modelosData, busqueda) {
    if (!busqueda.trim()) return modelosData;
    const lower = busqueda.toLowerCase();
    return modelosData.filter(mod => 
      (mod.titulo && mod.titulo.toLowerCase().includes(lower)) ||
      (mod.categoria && mod.categoria.toLowerCase().includes(lower)) ||
      (mod.thematic && mod.thematic.toLowerCase().includes(lower)) ||
      (mod.ley && mod.ley.toLowerCase().includes(lower)) ||
      (mod.cuerpo && mod.cuerpo.toLowerCase().includes(lower))
    );
  }

  async function renderizarPanelConEtapas(materiaNombre, procesoNombre, filtroTexto = "") {
    const contenedorEtapas = document.getElementById('etapasDinamicasContainer');
    if (!contenedorEtapas) return;
    contenedorEtapas.innerHTML = '<div class="loading-spinner">Cargando modelos...</div>';
    
    const resultados = await Promise.all(etapasFijas.map(async (etapa) => {
      const modelo = await fetchModeloEtapa(materiaNombre, procesoNombre, etapa.nombre);
      return { etapa, modelo };
    }));
    
    let html = '<div class="etapa-container">';
    for (const item of resultados) {
      const etapa = item.etapa;
      let modelo = item.modelo;
      if (filtroTexto && modelo) {
        const pasaFiltro = filtrarModelosSegunBusqueda([modelo], filtroTexto).length > 0;
        if (!pasaFiltro) modelo = null;
      }
      html += `
        <div class="etapa-card" data-etapa="${etapa.nombre}">
          <div class="etapa-numero">Etapa ${etapa.numero}</div>
          <div class="etapa-titulo">${etapa.nombre}</div>
          <div class="descripcion-etapa">${etapa.descripcion}</div>
          <div class="modelo-info">
            ${modelo ? `<span class="modelo-titulo">📄 ${escapeHtml(modelo.titulo || 'Sin título')}</span>` : `<span class="modelo-titulo" style="background:#f0f2f5; color:#7f8c8d;">✖ Ningún modelo asociado</span>`}
            <div class="botones-modelo">
              ${modelo ? `
                <button class="btn-mostrar" data-modeloid="${modelo.id}" data-materia="${materiaNombre}" data-proceso="${procesoNombre}" data-etapa="${etapa.nombre}">Mostrar</button>
              ` : `
                <button class="btn-crear" data-materia="${materiaNombre}" data-proceso="${procesoNombre}" data-etapa="${etapa.nombre}" data-accion="crear">+ Crear modelo</button>
              `}
            </div>
          </div>
        </div>
      `;
    }
    html += '</div><div class="mensaje-guia"><strong>✍️ Gestión unificada:</strong> Use "Mostrar" para ver, editar o imprimir el documento.</div>';
    contenedorEtapas.innerHTML = html;

    document.querySelectorAll('.btn-mostrar').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-modeloid');
        const materia = btn.getAttribute('data-materia');
        const proceso = btn.getAttribute('data-proceso');
        const etapa = btn.getAttribute('data-etapa');
        await abrirModalVerDocumento(id, materia, proceso, etapa);
      });
    });
    document.querySelectorAll('[data-accion="crear"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const materia = btn.getAttribute('data-materia');
        const proceso = btn.getAttribute('data-proceso');
        const etapa = btn.getAttribute('data-etapa');
        abrirModalParaCrear(materia, proceso, etapa);
      });
    });
  }

  async function abrirModalVerDocumento(id, materia, proceso, etapa) {
    try {
      const docSnap = await modelosEtapaCollection.doc(id).get();
      if (!docSnap.exists) { alert("El documento ya no existe."); return; }
      const data = docSnap.data();
      currentDocumentoData = { 
        id: id,
        titulo: data.titulo,
        materia: data.materia,
        proceso: data.proceso,
        etapa: data.etapa,
        tipoDocumento: data.tipoDocumento,
        thematic: data.thematic,
        ley: data.ley,
        cuerpo: data.cuerpo,
        materiaContext: materia,
        procesoContext: proceso,
        etapaContext: etapa
      };
      
      const container = document.getElementById('contenidoVerDocumento');
      container.innerHTML = `
        <div class="documento-completo">
          <div class="doc-meta">
            <p><strong>📌 Título:</strong> ${escapeHtml(data.titulo)}</p>
            <p><strong>⚖️ Materia:</strong> ${escapeHtml(data.materia)}</p>
            <p><strong>📂 Proceso:</strong> ${escapeHtml(data.proceso)}</p>
            <p><strong>📑 Etapa:</strong> ${escapeHtml(data.etapa)}</p>
            <p><strong>📄 Tipo documento:</strong> ${escapeHtml(data.tipoDocumento)}</p>
            <p><strong>🏷️ Temática:</strong> ${escapeHtml(data.thematic)}</p>
            <p><strong>📚 Ley:</strong> ${escapeHtml(data.ley || '—')}</p>
          </div>
          <div class="doc-contenido">
            <strong>✍️ Contenido:</strong>
            <div style="margin-top: 10px;">${data.cuerpo || ''}</div>
          </div>
        </div>
      `;
      document.getElementById('modalVerDocumento').style.display = 'flex';
    } catch (error) {
      console.error(error);
      alert("Error al cargar documento: " + error.message);
    }
  }

  function cerrarVerModal() {
    document.getElementById('modalVerDocumento').style.display = 'none';
    currentDocumentoData = null;
  }

  async function editarDesdeVer() {
    if (!currentDocumentoData) return;
    const docData = currentDocumentoData;
    cerrarVerModal();
    await abrirModalParaEditar(docData.id, docData.materiaContext, docData.procesoContext, docData.etapaContext);
  }

  function imprimirDesdeVer() {
    if (currentDocumentoData) {
      imprimirDocumento(currentDocumentoData);
    } else {
      alert("No hay documento cargado");
    }
  }

  function imprimirDocumento(data) {
    const ventana = window.open('', '_blank');
    ventana.document.write(`
      <html><head><title>${escapeHtml(data.titulo)}</title>
      <style>body{font-family: 'Inter', Arial; padding:2rem;} h1{color:#1e4a6b;} .meta{background:#f4f7fb; padding:10px; border-radius:12px;}</style>
      </head><body>
      <h1>${escapeHtml(data.titulo)}</h1>
      <div class="meta"><strong>Materia:</strong> ${escapeHtml(data.materia)} | <strong>Proceso:</strong> ${escapeHtml(data.proceso)} | <strong>Etapa:</strong> ${escapeHtml(data.etapa)}<br>
      <strong>Temática:</strong> ${escapeHtml(data.thematic)} | <strong>Tipo:</strong> ${escapeHtml(data.tipoDocumento)} | <strong>Ley:</strong> ${escapeHtml(data.ley || '-')}</div>
      <hr><div>${data.cuerpo || ''}</div></body></html>
    `);
    ventana.document.close();
    ventana.print();
  }

  async function abrirModalParaEditar(modelId, materia, proceso, etapa) {
    try {
      const docSnap = await modelosEtapaCollection.doc(modelId).get();
      if (!docSnap.exists) { alert("El modelo ya no existe."); return; }
      const data = docSnap.data();
      document.getElementById('modeloDocId').value = modelId;
      document.getElementById('tituloModelo').value = data.titulo || '';
      document.getElementById('leyModelo').value = data.ley || '';
      document.getElementById('materiaHidden').value = materia;
      document.getElementById('procesoHidden').value = proceso;
      document.getElementById('etapaHidden').value = etapa;
      document.getElementById('materiaModelo').value = data.materia;
      document.getElementById('procesoLibre').value = data.proceso;
      document.getElementById('etapaModelo').value = data.etapa;
      document.getElementById('tipoDocumento').value = data.tipoDocumento || '';
      document.getElementById('thematicModelo').value = data.thematic || '';
      if (quillEditor) quillEditor.clipboard.dangerouslyPasteHTML(data.cuerpo || '');
      document.getElementById('modalTitleModelo').innerText = `Editar: ${data.titulo || 'modelo'}`;
      document.getElementById('modalModelo').style.display = 'flex';
    } catch (error) { console.error(error); alert("Error al cargar datos"); }
  }

  function abrirModalParaCrear(materia, proceso, etapa) {
    document.getElementById('modeloDocId').value = '';
    document.getElementById('tituloModelo').value = '';
    document.getElementById('leyModelo').value = '';
    document.getElementById('tipoDocumento').value = '';
    if (quillEditor) quillEditor.setContents([]);
    document.getElementById('materiaHidden').value = materia;
    document.getElementById('procesoHidden').value = proceso;
    document.getElementById('etapaHidden').value = etapa;
    document.getElementById('materiaModelo').value = materia;
    document.getElementById('procesoLibre').value = proceso;
    document.getElementById('etapaModelo').value = etapa;
    document.getElementById('thematicModelo').value = "";
    document.getElementById('modalTitleModelo').innerText = `Nuevo modelo - ${etapa}`;
    document.getElementById('modalModelo').style.display = 'flex';
  }

  async function guardarModeloDesdeModal(event) {
    event.preventDefault();
    const titulo = document.getElementById('tituloModelo').value.trim();
    const materia = document.getElementById('materiaModelo').value;
    const proceso = document.getElementById('procesoLibre').value.trim();
    const etapa = document.getElementById('etapaModelo').value;
    const tipoDocumento = document.getElementById('tipoDocumento').value;
    const thematic = document.getElementById('thematicModelo').value;
    const ley = document.getElementById('leyModelo').value.trim();
    const cuerpo = quillEditor ? quillEditor.root.innerHTML : '';
    if (!titulo || !materia || !proceso || !etapa || !tipoDocumento || !thematic || !cuerpo) {
      alert("Complete todos los campos obligatorios.");
      return;
    }
    const modeloData = { titulo, materia, proceso, etapa, tipoDocumento, thematic, ley, cuerpo, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    const docId = document.getElementById('modeloDocId').value || null;
    if (await saveModeloEtapa(modeloData, docId)) {
      cerrarModalModelo();
      await construirSidebarDinamico();
      if (currentMateria === materia && currentProceso === proceso) {
        await renderizarPanelConEtapas(materia, proceso, document.getElementById('searchModelos').value);
      } else {
        const nuevoProceso = document.querySelector(`.proceso-enlace[data-materia="${materia}"][data-proceso="${escapeHtmlAttr(proceso)}"]`);
        if (nuevoProceso) nuevoProceso.click();
        else {
          currentMateria = materia;
          currentProceso = proceso;
          document.getElementById('procesoSeleccionadoNombre').innerText = proceso;
          document.getElementById('subMateriaProceso').innerHTML = `Materia: ${materia} · Modelos por etapa`;
          await renderizarPanelConEtapas(materia, proceso, '');
        }
      }
    }
  }

  function cerrarModalModelo() { document.getElementById('modalModelo').style.display = 'none'; }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  document.addEventListener('DOMContentLoaded', () => {
    initQuillEditor();
    construirSidebarDinamico();
    
    const btnNuevoGlobal = document.createElement('button');
    btnNuevoGlobal.id = 'btnNuevoModeloGlobal';
    btnNuevoGlobal.className = 'btn-nuevo-modelo';
    btnNuevoGlobal.innerText = '+ Nuevo modelo';
    document.querySelector('.cabecera-proceso').appendChild(btnNuevoGlobal);
    btnNuevoGlobal.addEventListener('click', () => abrirModalParaCrear('', '', 'Etapa inicial'));
    
    document.getElementById('closeModalBtnModelo').addEventListener('click', cerrarModalModelo);
    document.getElementById('cancelModalBtn').addEventListener('click', cerrarModalModelo);
    document.getElementById('etapaModelForm').addEventListener('submit', guardarModeloDesdeModal);
    document.getElementById('closeVerModal').addEventListener('click', cerrarVerModal);
    document.getElementById('btnEditarDesdeVer').addEventListener('click', editarDesdeVer);
    document.getElementById('btnImprimirDesdeVer').addEventListener('click', imprimirDesdeVer);
    
    window.addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalModelo')) cerrarModalModelo();
      if (e.target === document.getElementById('modalVerDocumento')) cerrarVerModal();
    });
    
    const searchInput = document.getElementById('searchModelos');
    searchInput.addEventListener('input', (e) => {
      if (currentMateria && currentProceso) {
        renderizarPanelConEtapas(currentMateria, currentProceso, e.target.value);
      }
    });
  });
</script>
</body>
</html>
