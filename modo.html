<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Modos de Intervención | Gestión de Defensoría</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow-x: hidden; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #0a2b3e;
            line-height: 1.4;
        }

        .app-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .columna-izquierda {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .titulo-principal {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e4a6b;
            text-transform: uppercase;
            border-bottom: 4px solid #ff9800;
            padding-bottom: 12px;
            margin-bottom: 1.5rem;
        }

        .buscador-contenedor {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .buscador-input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            border: 1px solid #dce9f0;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            background: white;
        }

        .buscador-input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 4px rgba(44, 125, 160, 0.1);
        }

        .buscador-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .scroll-modos {
            height: calc(100vh - 280px);
            overflow-y: auto;
            padding-right: 8px;
        }

        .scroll-modos::-webkit-scrollbar { width: 6px; }
        .scroll-modos::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .tarjeta-modo {
            background: white;
            border-radius: 15px;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
            border: 1px solid #dce9f0;
            border-left: 6px solid #1e4a6b;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tarjeta-modo:hover {
            background: #f8fbff;
            transform: translateX(5px);
            border-left-color: #ff9800;
        }

        .tarjeta-modo.active {
            background: #eef2ff;
            border-left-color: #ff9800;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .modo-titulo {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e4a6b;
        }

        .columna-derecha {
            background: #ffffff;
            border-radius: 25px;
            padding: 2.5rem;
            border: 1px solid #dce9f0;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
            height: fit-content;
            position: sticky;
            top: 2rem;
            min-height: 550px;
        }

        .detalle-header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #f8fafc;
            padding-bottom: 1.5rem;
        }

        .detalle-titulo {
            color: #1e4a6b;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .detalle-subtitulo {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .seccion-cuadro {
            background: #f8fbff;
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eef2f7;
        }

        .seccion-cuadro h4 {
            color: #1e4a6b;
            font-weight: 800;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-normativa {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 8px;
            margin-right: 8px;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
        }

        .lista-items {
            list-style: none;
            padding: 0;
        }

        .lista-items li {
            position: relative;
            padding-left: 30px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .lista-items li::before {
            content: "•";
            position: absolute;
            left: 10px;
            color: #ff9800;
            font-weight: 900;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; padding: 1rem; }
            .columna-derecha { position: relative; top: 0; min-height: auto; }
            .scroll-modos { height: auto; max-height: 350px; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="container">
        <div class="columna-izquierda">
            <h1 class="titulo-principal">Modos de intervención</h1>
            <div class="buscador-contenedor">
                <i data-lucide="search" class="buscador-icon" style="width:20px; height:20px;"></i>
                <input type="text" id="filtroBusqueda" class="buscador-input" placeholder="Filtrar intervención...">
            </div>
            <div id="modesList" class="scroll-modos"></div>
        </div>

        <div class="columna-derecha">
            <div class="detalle-header">
                <h2 id="tituloDetalle" class="detalle-titulo">Panel Informativo</h2>
                <p id="subtituloDetalle" class="detalle-subtitulo">Seleccione un modo del listado</p>
            </div>
            <div id="contenedorCentral" class="fade-in"></div>
        </div>
    </div>
</div>

<script>

        "Ministerio Público en turno Diciembre",

                    <li>Traducción de términos jurídicos a lenguaje sencillo.</li>
                    <li>Aporte de pruebas basadas en el deseo del menor.</li>
                    <li>Acompañamiento en la Escucha del Juez.</li>
                    <li>Control para evitar la revictimización procesal.</li>
                    <li>Intervención en juicios de guarda y adopción.</li>
                    <li>Recurrir decisiones que ignoren la opinión del niño.</li>
                    <li>Asegurar el Interés Superior del Niño concreto.</li>
                </ul>
            </div>
            <span class="badge-normativa">Ley 26.061 | Art. 26 CCCN</span>
        `,
        "Tutor Ad Litem": `
            <div class="seccion-cuadro">
                <h4><i data-lucide="user-check"></i> Representación para el Pleito</h4>
            </div>
            <div class="seccion-cuadro">
                <h4><i data-lucide="list"></i> 10 Puntos Clave</h4>
                <ul class="lista-items">
                    <li>Designación por conflicto de intereses (Art. 109 CCCN).</li>
                    <li>Intervención limitada exclusivamente al juicio.</li>
                    <li>Independencia total frente a los progenitores.</li>
                    <li>Promoción de la mejor solución para el pupilo.</li>
                    <li>Control de transacciones o acuerdos propuestos.</li>
                    <li>Sustitución de la voluntad de los padres en el pleito.</li>
                    <li>Participación en peritajes psicológicos.</li>
                    <li>Rendición de cuentas ante el tribunal.</li>
                    <li>Neutralidad absoluta ante las partes en conflicto.</li>
                    <li>Cese al finalizar el expediente o la causa de conflicto.</li>
                </ul>
            </div>
            <span class="badge-normativa">Art. 109 CCCN</span>
        `,
        "Defensor Oficial Art 329 CPCC": `
            <div class="seccion-cuadro" style="border-left: 6px solid #5d6d7e;">
                <h4><i data-lucide="file-search"></i> Diligencias Preliminares</h4>
                <p>Intervención técnica para preparar un juicio, determinar la legitimación de las partes o asegurar pruebas de producción urgente.</p>
            </div>
            <div class="seccion-cuadro">
                <h4><i data-lucide="list"></i> 10 Puntos Clave</h4>
                <ul class="lista-items">
                    <li><b>Encuadre Legal:</b> Verificación de los supuestos taxativos de la Ley XII-27.</li>
                    <li><b>Legitimación:</b> Conocer la personalidad o carácter de los futuros demandados.</li>
                    <li><b>Exhibición de Cosas:</b> Control en la muestra de objetos muebles materia del pleito.</li>
                    <li><b>Testamentos:</b> Gestión de exhibición para herederos o legatarios.</li>
                    <li><b>Prueba Anticipada:</b> Declaración de testigos de avanzada edad o próximos a ausentarse.</li>
                    <li><b>Constatación:</b> Verificación del estado de inmuebles y carácter de ocupación.</li>
                    <li><b>Capacidad:</b> Nombramiento de tutor o curador especial para el pleito.</li>
                    <li><b>Libros de Comercio:</b> Control en la exhibición de registros societarios.</li>
                    <li><b>Protección de Derechos:</b> Vigilancia para no causar perjuicios innecesarios al requerido.</li>
                    <li><b>Control de Caducidad:</b> Vigilar que la demanda inicie en los 30 días posteriores.</li>
                </ul>
            </div>
            <span class="badge-normativa">Art. 329 Ley XII-27</span>
        `,
        "Defensor Oficial Art 626 CPCC": `
            <div class="seccion-cuadro" style="border-left: 6px solid #c0392b;">
                <h4><i data-lucide="home"></i> Desalojo: Reconocimiento Judicial</h4>
                <p>Intervención obligatoria en el reconocimiento judicial previo al traslado de la demanda en causales específicas.</p>
            </div>
            <div class="seccion-cuadro">
                <h4><i data-lucide="list"></i> 10 Puntos Clave</h4>
                <ul class="lista-items">
                    <li><b>Fundamento:</b> Deterioro, intrusión, cambio de destino o uso abusivo.</li>
                    <li><b>Acto Obligatorio:</b> Reconocimiento judicial antes del traslado de la demanda.</li>
                    <li><b>Plazo:</b> Realización dentro de los 5 días de la primera providencia.</li>
                    <li><b>Asistencia:</b> Presencia inexcusable del Defensor Oficial en el acto.</li>
                    <li><b>Constatación:</b> Verificación del estado del inmueble y de sus ocupantes.</li>
                    <li><b>Determinación de Calidad:</b> Indagar si son intrusos, tenedores o poseedores.</li>
                    <li><b>Protección de Menores:</b> Dar intervención si hay NNA en situación de riesgo.</li>
                    <li><b>Prevención de Abandono:</b> Entrega de tenencia provisoria si hay abandono (Art. 627).</li>
                    <li><b>Documentación:</b> Control del acta de constatación para que sea fiel a lo visto.</li>
                    <li><b>Garantía:</b> Asegurar el derecho de defensa de ocupantes ausentes.</li>
                </ul>
            </div>
            <span class="badge-normativa">Art. 626 Ley XII-27</span>
        `
    };

    function renderList(filtro = "") {
        const list = document.getElementById('modesList');
        const filtrados = MODOS_ORDENADOS.filter(m => m.toLowerCase().includes(filtro.toLowerCase()));
        
        list.innerHTML = filtrados.map(m => `
            <div class="tarjeta-modo ${m === currentSelection ? 'active' : ''}" onclick="selectItem('${m}')">
                <div class="modo-titulo">${m}</div>
            </div>
        `).join('');

        if (filtrados.length === 0) {
            list.innerHTML = '<p style="padding:2rem; color:#94a3b8; font-style:italic;">No se encontraron resultados...</p>';
        }
    }

    window.selectItem = function(name) {
        currentSelection = name;
        renderList(document.getElementById('filtroBusqueda').value);
        
        const title = document.getElementById('tituloDetalle');
        const subtitle = document.getElementById('subtituloDetalle');
        const content = document.getElementById('contenedorCentral');

        title.innerText = name;
        subtitle.innerText = "Información Legal y Técnica Verificada";
        
        content.innerHTML = contentData[name] || `
            <div class="seccion-cuadro">
                <h4><i data-lucide="info"></i> Descripción de Actuación</h4>
                <p>Este modo corresponde a la intervención conforme la <b>Ley IV-N.15</b> y el <b>CPC XII-27</b>.</p>
            </div>
        `;
        
        if (window.lucide) lucide.createIcons();
    };

    document.getElementById('filtroBusqueda').addEventListener('input', (e) => {
        renderList(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', () => {
        renderList();
        document.getElementById('contenedorCentral').innerHTML = `
            <div style="text-align:center; padding-top:6rem; color:#94a3b8;">
                <i data-lucide="file-check-2" style="width:50px; height:50px; margin-bottom:1rem; opacity:0.3;"></i>
                <p>Seleccione un modo del listado para visualizar la normativa completa.</p>
            </div>
        `;
        if (window.lucide) lucide.createIcons();
    });
</script>

</body>
</html>
