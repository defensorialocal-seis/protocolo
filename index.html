<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Protocolo de Actuación | Defensoría 6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- LÍNEAS DECORATIVAS GRISES (EXTREMO A EXTREMO) --- */
        .linea-deco-superior,
        .linea-deco-inferior {
            position: fixed;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #9ca3af;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 2px rgba(0,0,0,0.05);
        }

        .linea-deco-superior {
            top: 0;
        }

        .linea-deco-inferior {
            bottom: 0;
        }

        /* === NUEVA BARRA DECORATIVA CENTRAL HORIZONTAL === */
        .linea-deco-central {
            position: fixed;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #94a3b8;
            z-index: 8;
            pointer-events: none;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 1px rgba(0,0,0,0.1);
            opacity: 0.7;
        }

        /* Contenedor principal con efecto glass y borde azul animado */
        .protocolo-card {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: clamp(2rem, 8vw, 4rem);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            border: 2px solid rgba(56, 189, 248, 0.6);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08), 
                        0 0 0 2px rgba(56, 189, 248, 0.1) inset, 
                        0 0 20px rgba(2, 132, 199, 0.3);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            user-select: none;
            position: relative;
            z-index: 20;
            animation: borderGlow 3s infinite alternate ease-in-out;
        }

        @keyframes borderGlow {
            0% {
                border-color: rgba(56, 189, 248, 0.5);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06),
                            0 0 0 1px rgba(56, 189, 248, 0.2) inset,
                            0 0 12px rgba(14, 165, 233, 0.4);
                background: rgba(255, 255, 255, 0.82);
            }
            100% {
                border-color: rgba(2, 136, 209, 0.85);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1),
                            0 0 0 3px rgba(2, 132, 199, 0.25) inset,
                            0 0 28px rgba(2, 132, 199, 0.7);
                background: rgba(255, 255, 255, 0.92);
            }
        }

        .protocolo-card:hover {
            transform: translateY(-6px);
            animation: borderGlowHover 1.2s infinite alternate;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.88);
        }
        
        @keyframes borderGlowHover {
            0% {
                border-color: rgba(56, 189, 248, 0.7);
                box-shadow: 0 20px 38px rgba(0, 0, 0, 0.12),
                            0 0 0 2px rgba(2, 132, 199, 0.3) inset,
                            0 0 18px #38bdf8;
            }
            100% {
                border-color: #0ea5e9;
                box-shadow: 0 26px 48px rgba(0, 0, 0, 0.15),
                            0 0 0 4px rgba(2, 132, 199, 0.4) inset,
                            0 0 32px #0284c7;
            }
        }

        .protocolo-card:active {
            transform: scale(0.97);
            transition: 0.08s linear;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        h2 {
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 28px;
            letter-spacing: -0.01em;
            opacity: 0.9;
        }

        .decorator-line {
            height: 4px;
            width: 65px;
            background: linear-gradient(90deg, #1e3a8a, #38bdf8, #1e3a8a);
            margin: 0 auto;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .protocolo-card:hover .decorator-line {
            width: 120px;
        }

        .hint-text {
            margin-top: 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #5b6e8c;
            font-weight: 600;
            background: rgba(255,255,240,0.3);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .protocolo-card {
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- CONTENEDOR CIRCULAR GLASS: TAMAÑO AMPLIO E IMAGEN MÁS PEQUEÑA PARA VERLA COMPLETA --- */
        .glass-circle {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            overflow: hidden;
            cursor: pointer;
            min-width: 80px;
            min-height: 80px;
        }

        .glass-circle:hover {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.25), 0 0 0 2px rgba(255, 255, 255, 0.6) inset;
        }

        .glass-circle:active {
            transform: translateY(-50%) scale(0.96);
        }

        /* IMAGEN: reducida dentro del círculo para verse en plenitud */
        .glass-circle img {
            max-width: 80%;      /* La imagen ocupa como máximo el 80% del círculo */
            max-height: 80%;
            width: auto;
            height: auto;
            object-fit: contain; /* Mantiene la proporción sin recortes */
            object-position: center;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
            transition: transform 0.2s ease;
        }

        .glass-circle:hover img {
            transform: scale(1.02);
        }

        @media (max-width: 640px) {
            .protocolo-card {
                margin: 0 16px;
                padding: 2rem 1.5rem;
                backdrop-filter: blur(6px);
            }
            .linea-deco-superior,
            .linea-deco-inferior {
                height: 4px;
            }
            .linea-deco-central {
                height: 1.5px;
                opacity: 0.6;
            }
            .hint-text {
                margin-top: 32px;
                font-size: 0.7rem;
            }
            .glass-circle {
                left: 16px;
            }
        }
        
        /* Fondo con sutiles puntos decorativos */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(56, 189, 248, 0.05) 2%, transparent 2.5%);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- Líneas decorativas: arriba y abajo, extremo a extremo -->
    <div class="linea-deco-superior" aria-hidden="true"></div>
    <div class="linea-deco-inferior" aria-hidden="true"></div>
    
    <!-- Barra decorativa central horizontal -->
    <div class="linea-deco-central" aria-hidden="true"></div>

    <!-- CONTENEDOR CIRCULAR GLASS (tamaño amplio dinámico) + imagen ligeramente reducida -->
    <div class="glass-circle" id="iconCircle">
        <img src="https://github.com/defensorialocal-seis/protocolo/blob/main/icono1.png?raw=true" alt="Ícono Defensoría">
    </div>

    <main class="protocolo-card" id="mainContainer">
        <h1>Protocolo de Actuación</h1>
        <h2>Defensoría Oficial Civil y Comercial 6</h2>
        <div class="decorator-line"></div>
        <p class="hint-text">Toca para ingresar</p>
    </main>

    <script>
        // Función que mantiene el círculo grande (más grande que la tarjeta) 
        // y la imagen se ajusta automáticamente con max-width:80% para verse completa.
        function dimensionarCirculo() {
            const tarjeta = document.querySelector('.protocolo-card');
            const circulo = document.getElementById('iconCircle');
            if (tarjeta && circulo) {
                const alturaTarjeta = tarjeta.offsetHeight;
                // Hacemos el círculo un 70% más grande que la tarjeta (se ve imponente)
                let nuevoTamano = alturaTarjeta * 1.7;
                const tamanoMinimo = 130;
                const maxPorAltura = window.innerHeight * 0.7;
                const maxPorAncho = window.innerWidth * 0.42;
                const maxPermitido = Math.min(maxPorAltura, maxPorAncho);
                nuevoTamano = Math.min(Math.max(nuevoTamano, tamanoMinimo), maxPermitido);
                circulo.style.width = nuevoTamano + 'px';
                circulo.style.height = nuevoTamano + 'px';
            }
        }

        window.addEventListener('load', () => {
            dimensionarCirculo();
            setTimeout(dimensionarCirculo, 80);
        });
        window.addEventListener('resize', dimensionarCirculo);
        
        if (window.ResizeObserver) {
            const tarjeta = document.querySelector('.protocolo-card');
            if (tarjeta) {
                const resizeObserver = new ResizeObserver(() => {
                    dimensionarCirculo();
                });
                resizeObserver.observe(tarjeta);
            }
        }

        // Redirección al hacer clic en la tarjeta principal
        const container = document.getElementById('mainContainer');
        if (container) {
            container.addEventListener('click', () => {
                window.location.href = 'app.html';
            });
        }

        // Redirección también al hacer clic en el círculo
        const circle = document.getElementById('iconCircle');
        if (circle) {
            circle.addEventListener('click', () => {
                window.location.href = 'app.html';
            });
        }
    </script>
</body>
</html>
