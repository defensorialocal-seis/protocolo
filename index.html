<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Protocolo de Actuación | Defensoría 6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            transition: all 0.2s;
        }

        /* --- LÍNEAS DECORATIVAS GRISES (EXTREMO A EXTREMO) --- */
        .linea-deco-superior,
        .linea-deco-inferior {
            position: fixed;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #9ca3af;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 2px rgba(0,0,0,0.05);
        }

        .linea-deco-superior {
            top: 0;
        }

        .linea-deco-inferior {
            bottom: 0;
        }

        /* Barra decorativa central horizontal */
        .linea-deco-central {
            position: fixed;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #94a3b8;
            z-index: 8;
            pointer-events: none;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 1px rgba(0,0,0,0.1);
            opacity: 0.7;
        }

        /* Contenedor principal con efecto glass y borde azul animado */
        .protocolo-card {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: clamp(2rem, 8vw, 4rem);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            border: 2px solid rgba(56, 189, 248, 0.6);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08), 
                        0 0 0 2px rgba(56, 189, 248, 0.1) inset, 
                        0 0 20px rgba(2, 132, 199, 0.3);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            user-select: none;
            position: relative;
            z-index: 20;
            animation: borderGlow 3s infinite alternate ease-in-out;
        }

        @keyframes borderGlow {
            0% {
                border-color: rgba(56, 189, 248, 0.5);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06),
                            0 0 0 1px rgba(56, 189, 248, 0.2) inset,
                            0 0 12px rgba(14, 165, 233, 0.4);
                background: rgba(255, 255, 255, 0.82);
            }
            100% {
                border-color: rgba(2, 136, 209, 0.85);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1),
                            0 0 0 3px rgba(2, 132, 199, 0.25) inset,
                            0 0 28px rgba(2, 132, 199, 0.7);
                background: rgba(255, 255, 255, 0.92);
            }
        }

        .protocolo-card:hover {
            transform: translateY(-6px);
            animation: borderGlowHover 1.2s infinite alternate;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.88);
        }
        
        @keyframes borderGlowHover {
            0% {
                border-color: rgba(56, 189, 248, 0.7);
                box-shadow: 0 20px 38px rgba(0, 0, 0, 0.12),
                            0 0 0 2px rgba(2, 132, 199, 0.3) inset,
                            0 0 18px #38bdf8;
            }
            100% {
                border-color: #0ea5e9;
                box-shadow: 0 26px 48px rgba(0, 0, 0, 0.15),
                            0 0 0 4px rgba(2, 132, 199, 0.4) inset,
                            0 0 32px #0284c7;
            }
        }

        .protocolo-card:active {
            transform: scale(0.97);
            transition: 0.08s linear;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        h2 {
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 28px;
            letter-spacing: -0.01em;
            opacity: 0.9;
        }

        .decorator-line {
            height: 4px;
            width: 65px;
            background: linear-gradient(90deg, #1e3a8a, #38bdf8, #1e3a8a);
            margin: 0 auto;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .protocolo-card:hover .decorator-line {
            width: 120px;
        }

        .hint-text {
            margin-top: 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #5b6e8c;
            font-weight: 600;
            background: rgba(255,255,240,0.3);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .protocolo-card {
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- CONTENEDOR CIRCULAR GLASS: VERSIÓN ESCRITORIO (fijo lateral, gran tamaño) --- */
        .glass-circle {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            overflow: hidden;
            cursor: pointer;
            min-width: 80px;
            min-height: 80px;
        }

        .glass-circle:hover {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.25), 0 0 0 2px rgba(255, 255, 255, 0.6) inset;
        }

        .glass-circle:active {
            transform: translateY(-50%) scale(0.96);
        }

        /* IMAGEN: reducida dentro del círculo para verse en plenitud */
        .glass-circle img {
            max-width: 80%;
            max-height: 80%;
            width: auto;
            height: auto;
            object-fit: contain;
            object-position: center;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
            transition: transform 0.2s ease;
        }

        .glass-circle:hover img {
            transform: scale(1.02);
        }

        /* Fondo con sutiles puntos decorativos */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(56, 189, 248, 0.05) 2%, transparent 2.5%);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================= */
        /* === RESPONSIVE MÓVIL / TABLET PEQUEÑA: SIN SUPERPOSICIÓN, STACK VERTICAL === */
        /* ============================================= */
        @media (max-width: 860px) {
            body {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 1.5rem;
                padding: 2rem 1rem;
                overflow-y: auto;
            }

            /* Círculo: dejar de ser fixed, pasa a bloque relativo para NO superponer */
            .glass-circle {
                position: relative !important;
                left: auto !important;
                top: auto !important;
                transform: none !important;
                margin: 0 auto 0 auto !important;
                width: 140px !important;
                height: 140px !important;
                min-width: 120px;
                min-height: 120px;
                flex-shrink: 0;
                box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15), 0 0 0 2px rgba(255, 255, 255, 0.7) inset;
            }
            
            /* Ajuste hover/active para móvil (no hay desplazamiento Y extra) */
            .glass-circle:active {
                transform: scale(0.96) !important;
            }
            
            /* Tarjeta: ocupa el ancho disponible, sin márgenes laterales excesivos */
            .protocolo-card {
                max-width: 100%;
                width: 100%;
                margin: 0 auto;
                padding: 2rem 1.8rem;
                position: relative;
                z-index: 20;
            }
            
            /* pequeños ajustes de espaciado en hint text */
            .hint-text {
                margin-top: 28px;
            }
            
            /* Líneas decorativas siguen intactas */
            .linea-deco-superior,
            .linea-deco-inferior {
                height: 4px;
            }
            
            .linea-deco-central {
                height: 1.8px;
                opacity: 0.55;
            }
        }

        /* Ajuste adicional para pantallas muy compactas (hasta 480px) */
        @media (max-width: 480px) {
            body {
                gap: 1rem;
                padding: 1rem;
            }
            .glass-circle {
                width: 130px !important;
                height: 130px !important;
            }
            .protocolo-card {
                padding: 1.75rem 1.25rem;
            }
            h1 {
                font-size: 1.9rem;
            }
            h2 {
                font-size: 1rem;
            }
            .hint-text {
                font-size: 0.65rem;
                margin-top: 24px;
            }
        }

        /* En pantallas medianamente grandes como tablet en horizontal, seguimos sin overlap pero con círculo contenido */
        @media (min-width: 861px) and (max-width: 1100px) {
            /* Ajuste fino: si el círculo fijo aún pudiera rozar la tarjeta (anchos intermedios), le damos un pequeño margen izquierdo a la card */
            .protocolo-card {
                margin-left: 80px;
                max-width: 620px;
            }
            .glass-circle {
                left: 20px;
                width: 130px;
                height: 130px;
            }
        }

        /* Para pantallas grandes, mantenemos el diseño original elegante pero aseguramos que no overlap */
        @media (min-width: 1101px) {
            .protocolo-card {
                margin-left: 0;
            }
            .glass-circle {
                left: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- Líneas decorativas: arriba y abajo, extremo a extremo -->
    <div class="linea-deco-superior" aria-hidden="true"></div>
    <div class="linea-deco-inferior" aria-hidden="true"></div>
    
    <!-- Barra decorativa central horizontal -->
    <div class="linea-deco-central" aria-hidden="true"></div>

    <!-- CONTENEDOR CIRCULAR GLASS: con imagen reducida dentro, ahora responsivo sin overlap -->
    <div class="glass-circle" id="iconCircle">
        <img src="https://github.com/defensorialocal-seis/protocolo/blob/main/icono1.png?raw=true" alt="Ícono Defensoría">
    </div>

    <main class="protocolo-card" id="mainContainer">
        <h1>Protocolo de Actuación</h1>
        <h2>Defensoría Oficial Civil y Comercial 6</h2>
        <div class="decorator-line"></div>
        <p class="hint-text">Toca para ingresar</p>
    </main>

    <script>
        // Función de dimensionamiento dinámico SOLO para entorno de escritorio (pantallas anchas)
        // En móviles, el CSS con !important anula los anchos dinámicos y fija un tamaño amigable.
        // Esto garantiza que el círculo NUNCA superponga la tarjeta en móvil ni tablet estrecha.
        function dimensionarCirculo() {
            const tarjeta = document.querySelector('.protocolo-card');
            const circulo = document.getElementById('iconCircle');
            // Solo aplicamos el redimensionamiento cuando la pantalla sea mayor a 860px (modo escritorio)
            // Para evitar conflictos y mantener la estética original en desktop, y en mobile el CSS fijo prevalece.
            if (!tarjeta || !circulo) return;
            
            const anchoVentana = window.innerWidth;
            // Para resoluciones mayores a 860px, se usa el cálculo dinámico original (círculo grande lateral).
            // En móvil y tablets pequeñas, el CSS responsivo se encarga (width/height fijo con !important).
            if (anchoVentana > 860) {
                const alturaTarjeta = tarjeta.offsetHeight;
                // Tamaño base: círculo un 70% más grande que la altura de la tarjeta (efecto vistoso)
                let nuevoTamano = alturaTarjeta * 1.7;
                const tamanoMinimo = 140;
                const maxPorAltura = window.innerHeight * 0.7;
                const maxPorAncho = window.innerWidth * 0.35;
                const maxPermitido = Math.min(maxPorAltura, maxPorAncho, 380); // límite estético
                nuevoTamano = Math.min(Math.max(nuevoTamano, tamanoMinimo), maxPermitido);
                circulo.style.width = nuevoTamano + 'px';
                circulo.style.height = nuevoTamano + 'px';
            } else {
                // En dispositivos con ancho <=860px, no aplicamos estilos inline agresivos,
                // dejamos que la hoja de estilo (con !important) maneje las dimensiones fijas sin superposición.
                // Solo borramos posibles valores inline previos que pudieran quedar de un resize cruzado.
                if (circulo.style.width) {
                    circulo.style.width = '';
                    circulo.style.height = '';
                }
            }
        }

        // Función para garantizar que en cualquier cambio de orientación o resize, se recalcule correctamente
        // y en móvil nunca haya overlap.
        function handleResizeAndMobile() {
            dimensionarCirculo();
            // Verificación extra de seguridad: si detectamos que en modo móvil el círculo por algún motivo tuviera position fixed,
            // lo reafirmamos con CSS mediante clase, pero nuestro CSS ya lo hace robusto.
            if (window.innerWidth <= 860) {
                const circulo = document.getElementById('iconCircle');
                if (circulo && window.getComputedStyle(circulo).position === 'fixed') {
                    // Refuerzo: si algo extraño revierte el estilo, aseguramos compatibilidad
                    circulo.style.position = 'relative';
                    circulo.style.left = 'auto';
                    circulo.style.top = 'auto';
                    circulo.style.transform = 'none';
                }
            }
        }

        // Observador de cambios de tamaño de tarjeta para escritorio
        if (window.ResizeObserver) {
            const tarjeta = document.querySelector('.protocolo-card');
            if (tarjeta) {
                const resizeObserver = new ResizeObserver(() => {
                    // Solo aplicamos actualización de tamaño en escritorio
                    if (window.innerWidth > 860) {
                        dimensionarCirculo();
                    }
                });
                resizeObserver.observe(tarjeta);
            }
        }

        // Escucha de eventos de carga y redimensionamiento
        window.addEventListener('load', () => {
            handleResizeAndMobile();
            setTimeout(handleResizeAndMobile, 100);
        });
        window.addEventListener('resize', () => {
            handleResizeAndMobile();
        });

        // También observamos cambios de orientación
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResizeAndMobile, 50);
        });

        // Redirección al hacer clic en la tarjeta principal (app.html)
        const container = document.getElementById('mainContainer');
        if (container) {
            container.addEventListener('click', (e) => {
                e.stopPropagation();
                window.location.href = 'app.html';
            });
        }

        // Redirección también al hacer clic en el círculo (misma acción)
        const circle = document.getElementById('iconCircle');
        if (circle) {
            circle.addEventListener('click', (e) => {
                e.stopPropagation();
                window.location.href = 'app.html';
            });
        }

        // Pequeño refuerzo inicial para móviles: eliminar cualquier estilo inline conflictivo que pudiera alterar el tamaño fijo
        // sin afectar la funcionalidad general.
        (function ensureMobileNoOverlap() {
            const isMobileOrTablet = window.innerWidth <= 860;
            const circulo = document.getElementById('iconCircle');
            if (isMobileOrTablet && circulo) {
                // Dejamos que los estilos CSS con !important dominen: eliminamos cualquier width/height inline previo para mayor claridad.
                if (circulo.style.width) {
                    circulo.style.width = '';
                    circulo.style.height = '';
                }
                // Aseguramos que los atributos de posicionamiento hereden correctamente desde CSS.
                circulo.style.position = '';
                circulo.style.left = '';
                circulo.style.top = '';
                circulo.style.transform = '';
            }
            // También validamos que la tarjeta no tenga márgenes extraños en móvil
            if (isMobileOrTablet) {
                const tarjeta = document.querySelector('.protocolo-card');
                if (tarjeta && tarjeta.style.marginLeft) {
                    tarjeta.style.marginLeft = '';
                }
            }
        })();
    </script>
</body>
</html>
