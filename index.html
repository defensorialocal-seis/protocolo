<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Actuación | Defensoría 6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --azul-oscuro: #0f172a;
            --azul-claro: #475569;
            --bg-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Contenedor principal interactivo */
        .protocolo-card {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: clamp(2rem, 8vw, 4rem);
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(15, 23, 42, 0.05);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        /* Efecto hover sutil para indicar que es clickeable */
        .protocolo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border-color: rgba(15, 23, 42, 0.1);
        }

        .protocolo-card:active {
            transform: scale(0.98);
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            color: var(--azul-oscuro);
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        h2 {
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 600;
            color: var(--azul-claro);
            margin-bottom: 30px;
            letter-spacing: -0.01em;
        }

        .decorator-line {
            height: 4px;
            width: 60px;
            background-color: var(--azul-oscuro);
            margin: 0 auto;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Al pasar el mouse, la línea se expande un poco */
        .protocolo-card:hover .decorator-line {
            width: 100px;
        }

        .hint-text {
            margin-top: 40px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            font-weight: 600;
        }

        /* Animación de entrada */
        .protocolo-card {
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="protocolo-card" id="mainContainer">
        <h1>Protocolo de Actuación</h1>
        <h2>Defensoría Oficial Civil y Comercial 6</h2>
        <div class="decorator-line"></div>
        <p class="hint-text">Toca para ingresar</p>
    </main>

    <script>
        document.getElementById('mainContainer').addEventListener('click', () => {
            window.location.href = 'app.html';
        });
    </script>

</body>
</html>
