<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Protocolo Actuacion Defensoria</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

  <style>
    /* === MINIMALISTA + EXPANSIÓN TOTAL DEL CONTENIDO PRINCIPAL === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-app: #ffffff;
      --bg-panel: #ffffff;
      --border: #e2e8f0;
      --bg-soft: #f8fafc;
      --text-main: #0f172a;
      --text-sec: #475569;
      --accent: #1e3a5f;
      --accent-light: #f8fafc;
      --danger: #dc2626;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.04);
      --radius-sm: 10px;
      --radius-md: 14px;
      --transition: all 0.2s ease;
      --filter-height: 58px;    /* altura del filtro + márgenes */
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-app);
      color: var(--text-main);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== BARRA SUPERIOR FIJA ===== */
    .top-bar {
      height: 56px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(12px, 4vw, 24px);
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .header-title {
      font-size: clamp(0.8rem, 2vw, 0.9rem);
      font-weight: 500;
      color: var(--text-sec);
    }
    .menu-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      transition: var(--transition);
    }
    .menu-btn:hover {
      background: var(--accent-light);
      border-color: #cbd5e1;
    }
    .menu-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: min(88vw, 280px);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: var(--transition);
      z-index: 60;
    }
    .menu-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .menu-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .menu-item:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    .logout-btn {
      background: transparent;
      border: 1px solid #fecaca;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--danger);
      cursor: pointer;
      transition: var(--transition);
    }
    .logout-btn:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    /* ===== CONTENIDO PRINCIPAL EXPANDIDO ===== */
    .main-content {
      flex: 1;                 /* toma todo el espacio restante */
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px clamp(12px, 4vw, 24px);
      /* El padding inferior deja espacio para el filtro fijo */
      padding-bottom: calc(16px + var(--filter-height));
      min-height: 0;
    }

    /* Cuando se muestra iframe, eliminamos padding para que ocupe todo excepto el espacio del filtro */
    .main-content.iframe-mode {
      padding: 0 !important;
      padding-bottom: var(--filter-height) !important;
      background: #ffffff;
    }

    /* Contenedor dinámico: se expande verticalmente al máximo */
    #dynamicContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* El grid de tarjetas debe ocupar toda la altura disponible */
    .content-grid {
      flex: 1;
      display: grid;
      gap: 16px;
      align-content: start; /* evita estirar las tarjetas innecesariamente, pero ocupa todo el alto */
      width: 100%;
    }

    /* Escritorio 5 columnas, tablet 2, móvil 1 (inalterado) */
    @media (min-width: 768px) {
      .content-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }
    @media (max-width: 767px) {
      .content-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 480px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Tarjetas minimalistas */
    .content-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: clamp(14px, 2vw, 22px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      border-left: 3px solid transparent;
      min-height: 95px;
      text-align: center;
    }
    .content-card.hidden {
      display: none;
    }
    .content-card:hover {
      border-left-color: var(--accent);
      background: #fefefe;
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .content-card h3 {
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 600;
      color: var(--text-main);
    }
    .content-card:hover h3 {
      color: var(--accent);
    }

    /* Banner bienvenida (no ocupa espacio extra, fluye normalmente) */
    .welcome-banner {
      background: linear-gradient(115deg, #f8fafc 0%, #ffffff 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: clamp(20px, 4vw, 28px);
      margin-bottom: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .welcome-banner.hide-banner {
      display: none;
    }
    .welcome-highlight {
      display: inline-block;
      font-size: clamp(1.6rem, 6vw, 2.1rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1e3a5f, #2d4a6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .welcome-banner h2 .regular-text {
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 400;
      color: var(--text-sec);
    }

    /* PANEL IFRAME - también ocupa todo el espacio vertical */
    .iframe-panel {
      display: flex;
      flex-direction: column;
      background: #ffffff;
      width: 100%;
      flex: 1;
      min-height: 0;
      height: 100%;
    }
    .iframe-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      flex-shrink: 0;
      gap: 12px;
    }
    .iframe-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }
    .back-btn {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--accent);
      transition: var(--transition);
    }
    .back-btn:hover {
      background: var(--accent);
      color: white;
    }
    .iframe-container {
      flex: 1;
      background: #fafcff;
      min-height: 0;
      width: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .preparation-message {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .preparation-message svg {
      stroke: #94a3b8;
    }
    .preparation-message h3 {
      margin: 0.5rem 0;
      font-weight: 500;
    }

    /* ===== FILTRO FLOTANTE SIEMPRE VISIBLE ===== */
    .chat-filter {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(94%, 600px);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 4px 6px 4px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
      z-index: 100;
      backdrop-filter: blur(0px);
      background: rgba(255, 255, 255, 0.98);
    }
    .chat-filter input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.85rem;
      padding: 12px 4px;
      background: transparent;
      font-family: inherit;
      color: var(--text-main);
    }
    .chat-filter input::placeholder {
      color: var(--text-sec);
      opacity: 0.6;
    }
    .chat-filter button {
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .chat-filter button:hover {
      background: #0f2a44;
    }

    /* Modal minimalista */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(2px);
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      z-index: 200;
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .modal-card {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-md);
      padding: 24px 20px;
      width: min(90%, 320px);
      text-align: center;
    }
    .modal-card h2 {
      color: var(--danger);
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal-card p {
      color: #991b1b;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .modal-btn {
      padding: 8px 18px;
      border-radius: 40px;
      border: none;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      flex: 1;
    }
    .btn-cancel {
      background: #f1f5f9;
      color: var(--text-main);
      border: 1px solid var(--border);
    }
    .btn-confirm {
      background: var(--danger);
      color: white;
    }

    /* Ajustes responsivos */
    @media (max-width: 768px) {
      .menu-btn, .menu-dropdown { display: none; }
      .header-title { display: none; }
      .top-bar { justify-content: flex-end; }
      .chat-filter { bottom: 12px; padding: 4px 6px 4px 12px; }
      .chat-filter button { padding: 6px 14px; }
      .main-content { padding-bottom: calc(12px + var(--filter-height)); }
    }
    @media (max-width: 480px) {
      .content-card { min-height: 80px; }
      .welcome-highlight { font-size: 1.5rem; }
    }

    /* Scroll */
    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-track { background: #f1f5f9; }
    .main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .iframe-panel { animation: fadeSlide 0.2s ease; }
  </style>
</head>
<body>

  <header class="top-bar">
    <div class="header-left">
      <button class="menu-btn" id="menuBtn">Menú</button>
      <span class="header-title">Protocolo de Actuación Judicial · Defensoría Civil y Comercial 6</span>
      <nav class="menu-dropdown" id="menuDropdown">
        <button class="menu-item" data-key="atencion_publico">Cómo atender al público</button>
        <button class="menu-item" data-key="documentos_previos">Qué revisar antes de empezar</button>
        <button class="menu-item" data-key="subrogacion">Subrogación</button>
        <button class="menu-item" data-key="antes_tramitar">Antes de mover un expediente</button>
        <button class="menu-item" data-key="escribir_documentos">Cómo escribir documentos</button>
        <button class="menu-item" data-key="opiniones_tecnicas">Opinión técnica: Dictamen</button>
        <button class="menu-item" data-key="leyes_utiles">Leyes que vas a usar</button>
        <button class="menu-item" data-key="situaciones_especiales">Situaciones especiales</button>
        <button class="menu-item" data-key="plazos_vencimientos">Plazos y Vencimientos</button>
        <button class="menu-item" data-key="modelos_usar">Modelos para usar</button>
        <button class="menu-item" data-key="modos_intervenir">Modos de Intervenir</button>
        <button class="menu-item" data-key="mapa_defensorias">Mapa de Defensorías</button>
        <button class="menu-item" data-key="firma_digital_stamper">Firma Digital y Stamper</button>
        <button class="menu-item" data-key="meui">MEUI</button>
        <button class="menu-item" data-key="cejume">CEJUME</button>
      </nav>
    </div>
    <button class="logout-btn" id="btnLogout">Salir</button>
  </header>

  <main class="main-content" id="mainContent">
    <div class="welcome-banner" id="welcomeBanner">
      <h2>
        <span class="welcome-highlight">Hola, Defensoria.</span><br>
        <span class="regular-text">Seleccioná un tema para ver el contenido completo.</span>
      </h2>
    </div>
    <div id="dynamicContainer"></div>
  </main>

  <div class="chat-filter" id="filterBar">
    <input type="text" id="filterInput" placeholder="Buscar tema (atención, plazos, leyes...)" autocomplete="off">
    <button id="filterBtn">Buscar</button>
  </div>

  <div class="modal-overlay" id="logoutModal">
    <div class="modal-card">
      <h2>¿Cerrar sesión?</h2>
      <p>Se perderán los filtros. Puedes volver cuando quieras.</p>
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" id="btnCancelLogout">Cancelar</button>
        <button class="modal-btn btn-confirm" id="btnConfirmLogout">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // === TODA LA FUNCIONALIDAD ORIGINAL SE MANTIENE INTACTA ===
    const externalUrls = {
      atencion_publico: "publico.html",
      documentos_previos: "previos.html",
      subrogacion: "subrogancias.html",
      antes_tramitar: "expedientes.html",
      escribir_documentos: "escritos.html",
      opiniones_tecnicas: "dictamen.html",
      leyes_utiles: "normativa.html",
      situaciones_especiales: "casos.html",
      plazos_vencimientos: "plazos.html",
      modelos_usar: "modelos.html",
      modos_intervenir: "modo.html",
      mapa_defensorias: "mapa.html",
      firma_digital_stamper: "firma.html",
      meui: "meui.html",
      cejume: "cejume.html"
    };

    const mainContent = document.getElementById('mainContent');
    const dynamicContainer = document.getElementById('dynamicContainer');
    const filterInput = document.getElementById('filterInput');
    const filterBtn = document.getElementById('filterBtn');
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');
    const logoutBtn = document.getElementById('btnLogout');
    const logoutModal = document.getElementById('logoutModal');
    const btnCancel = document.getElementById('btnCancelLogout');
    const btnConfirm = document.getElementById('btnConfirmLogout');
    const welcomeBanner = document.getElementById('welcomeBanner');

    let currentIframeActive = false;

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function closeIframeView() {
      if (!currentIframeActive) return false;
      mainContent.classList.remove('iframe-mode');
      rebuildGrid();
      welcomeBanner.classList.remove('hide-banner');
      currentIframeActive = false;
      return true;
    }

    function rebuildAndFilter() {
      rebuildGrid();
      if (filterInput.value.trim() !== "") applyFilterOnGrid();
      else {
        document.querySelectorAll('.content-card').forEach(c => c.classList.remove('hidden'));
        const noResultsMsg = document.getElementById('noResultsMsg');
        if (noResultsMsg) noResultsMsg.remove();
      }
    }

    function rebuildGrid() {
      dynamicContainer.innerHTML = `
        <div class="content-grid" id="contentGrid">
          <article class="content-card" data-key="atencion_publico" data-keywords="atencion publico trato personas paciencia escucha activa"><h3>Cómo atender al público</h3></article>
          <article class="content-card" data-key="documentos_previos" data-keywords="documentos previos revisar papeles checklist legajo"><h3>Qué revisar antes de empezar</h3></article>
          <article class="content-card" data-key="subrogacion" data-keywords="subrogación suplencia ausencia temporal reemplazo"><h3>Subrogación</h3></article>
          <article class="content-card" data-key="antes_tramitar" data-keywords="antes de tramitar revisar expediente competencia firmas"><h3>Antes de mover un expediente</h3></article>
          <article class="content-card" data-key="escribir_documentos" data-keywords="escribir documentos claros simples estructura redacción"><h3>Cómo escribir documentos</h3></article>
          <article class="content-card" data-key="opiniones_tecnicas" data-keywords="opiniones tecnicas analisis conclusiones fundamentar dictamen"><h3>Opinión técnica: Dictamen</h3></article>
          <article class="content-card" data-key="leyes_utiles" data-keywords="leyes utiles normas consulta rapida codigos"><h3>Leyes que vas a usar</h3></article>
          <article class="content-card" data-key="situaciones_especiales" data-keywords="situaciones especiales urgencias excepciones vulnerabilidad"><h3>Situaciones especiales</h3></article>
          <article class="content-card" data-key="plazos_vencimientos" data-keywords="plazos vencimientos fechas caducidad términos perentorio cómputo"><h3>Plazos y Vencimientos</h3></article>
          <article class="content-card" data-key="modelos_usar" data-keywords="modelos formatos plantillas ejemplos documentos escritos redacción"><h3>Modelos para usar</h3></article>
          <article class="content-card" data-key="modos_intervenir" data-keywords="modos intervenir estrategias abordaje intervención herramientas acompañamiento"><h3>Modos de Intervenir</h3></article>
          <article class="content-card" data-key="mapa_defensorias" data-keywords="mapa defensorías ubicaciones contactos georreferencia sedes territoriales"><h3>Mapa de Defensorías</h3></article>
          <article class="content-card" data-key="firma_digital_stamper" data-keywords="firma digital stamper certificado electrónico firmar documentos"><h3>Firma Digital y Stamper</h3></article>
          <article class="content-card" data-key="meui" data-keywords="meui expediente electrónico gestión judicial sistema informático"><h3>MEUI</h3></article>
          <article class="content-card" data-key="cejume" data-keywords="cejume centro judicial mediación justicia restaurativa"><h3>CEJUME</h3></article>
        </div>
      `;
      attachCardEvents();
    }

    function attachCardEvents() {
      document.querySelectorAll('.content-card').forEach(card => {
        card.removeEventListener('click', cardClickHandler);
        card.addEventListener('click', cardClickHandler);
      });
    }

    function cardClickHandler(e) {
      const card = e.currentTarget;
      const key = card.dataset.key;
      const title = card.querySelector('h3')?.innerText || "Protocolo";
      showFullContent(key && externalUrls[key] ? key : 'atencion_publico', title);
    }

    function showFullContent(key, title) {
      const url = externalUrls[key];
      welcomeBanner.classList.add('hide-banner');
      mainContent.classList.add('iframe-mode');
      dynamicContainer.innerHTML = '';
      const panel = document.createElement('div');
      panel.className = 'iframe-panel';
      if (url && url.trim()) {
        panel.innerHTML = `
          <div class="iframe-header">
            <h3>${escapeHtml(title)}</h3>
            <button class="back-btn" id="closeIframeBtn">← Volver</button>
          </div>
          <div class="iframe-container">
            <iframe src="${escapeHtml(url)}" title="${escapeHtml(title)}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
          </div>
        `;
      } else {
        panel.innerHTML = `
          <div class="iframe-header">
            <h3>${escapeHtml(title)}</h3>
            <button class="back-btn" id="closeIframeBtn">← Volver</button>
          </div>
          <div class="preparation-message">
            <div>
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              <h3>Contenido en preparación</h3>
              <p>Próximamente disponible <strong>${escapeHtml(title)}</strong>.</p>
            </div>
          </div>
        `;
      }
      dynamicContainer.appendChild(panel);
      currentIframeActive = true;
      const closeBtn = document.getElementById('closeIframeBtn');
      if (closeBtn) closeBtn.addEventListener('click', () => {
        closeIframeView();
        if (filterInput.value.trim()) applyFilterOnGrid();
      });
    }

    function applyFilterOnGrid() {
      const grid = document.getElementById('contentGrid');
      if (!grid || currentIframeActive) return;
      const query = filterInput.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.content-card');
      let visible = 0;
      cards.forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        const keywords = card.dataset.keywords?.toLowerCase() || '';
        const match = !query || title.includes(query) || keywords.includes(query);
        card.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      let noMsg = document.getElementById('noResultsMsg');
      if (visible === 0 && query) {
        if (!noMsg) {
          noMsg = document.createElement('p');
          noMsg.id = 'noResultsMsg';
          noMsg.style.cssText = 'text-align:center; color:var(--text-sec); margin-top:20px; font-size:0.8rem;';
          noMsg.textContent = 'No se encontró el tema. Prueba con otras palabras.';
          grid.after(noMsg);
        }
      } else if (noMsg) noMsg.remove();
    }

    function handleFilterAndClose() {
      if (currentIframeActive) {
        closeIframeView();
        if (filterInput.value.trim()) applyFilterOnGrid();
      } else applyFilterOnGrid();
    }

    function menuClickHandler(e) {
      e.stopPropagation();
      const key = e.currentTarget.dataset.key;
      const title = e.currentTarget.innerText.trim();
      showFullContent(key && externalUrls[key] ? key : 'atencion_publico', title);
      menuDropdown?.classList.remove('open');
    }

    function init() {
      rebuildGrid();
      welcomeBanner.classList.remove('hide-banner');
      filterInput.value = '';
      applyFilterOnGrid();
      currentIframeActive = false;
      mainContent.classList.remove('iframe-mode');

      filterInput.addEventListener('input', handleFilterAndClose);
      filterBtn.addEventListener('click', handleFilterAndClose);
      if (menuBtn) {
        menuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          menuDropdown.classList.toggle('open');
        });
      }
      document.addEventListener('click', (e) => {
        if (menuDropdown && !menuDropdown.contains(e.target) && e.target !== menuBtn) {
          menuDropdown.classList.remove('open');
        }
      });
      document.querySelectorAll('.menu-item').forEach(item => {
        item.removeEventListener('click', menuClickHandler);
        item.addEventListener('click', menuClickHandler);
      });

      logoutBtn.addEventListener('click', () => logoutModal.classList.add('open'));
      btnCancel.addEventListener('click', () => logoutModal.classList.remove('open'));
      btnConfirm.addEventListener('click', () => window.location.href = 'index.html');
      logoutModal.addEventListener('click', (e) => { if (e.target === logoutModal) logoutModal.classList.remove('open'); });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (currentIframeActive) {
            closeIframeView();
            if (filterInput.value.trim()) applyFilterOnGrid();
          }
          logoutModal.classList.remove('open');
          menuDropdown?.classList.remove('open');
        }
      });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
